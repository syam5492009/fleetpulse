services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-fleetpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetpulse}
      POSTGRES_DB:       ${POSTGRES_DB:-fleetpulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleetpulse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleetpulse}:${POSTGRES_PASSWORD:-fleetpulse}@postgres:5432/${POSTGRES_DB:-fleetpulse}
      REDIS_URL:    redis://redis:6379
      MQTT_BROKER:  mqtt://mosquitto:1883
      PORT:         "3001"
      CORS_ORIGIN:  ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:                 production
      NEXT_PUBLIC_API_URL:      ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL:       ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
